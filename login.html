<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Otaku Fit · Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
</head>
<body>
<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html"><span class="logo" aria-hidden="true"></span><span>Otaku Fit</span></a>
    <nav class="nav-links">
      <a class="chip" href="index.html">Inicio</a>
      <a class="chip" href="dashboard.html">Dashboard</a>
    </nav>
  </div>
</header>

<main class="container section">
  <h2>Acceso</h2>
  <p class="sub">Crea cuenta o inicia sesión. Si eres cliente, introduce el código de invitación del coach.</p>

  <div class="card pad">
    <form id="authForm" class="form">
      <div>
        <label>Nombre</label>
        <input name="name"/>
      </div>

      <div>
        <label>Email</label>
        <input name="email" type="email" required />
      </div>

      <div>
        <label>Contraseña</label>
        <input name="password" type="password" minlength="6" required />
      </div>

      <div>
        <label>Código invitación (si eres cliente)</label>
        <input name="inviteCode" placeholder="Ej: ABCD-1234" />
      </div>

      <div class="btn-row">
        <button class="btn primary" type="button" id="btnRegister">Crear cuenta</button>
        <button class="btn" type="submit">Entrar</button>
      </div>

      <div id="notice" class="notice">—</div>
    </form>
  </div>
</main>

<script type="module">
  import { auth, db } from "./js/firebase.js";
  import { createUserWithEmailAndPassword, signInWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { doc, getDoc, setDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const form = document.getElementById("authForm");
  const notice = document.getElementById("notice");
  const btnRegister = document.getElementById("btnRegister");

  const setN = (type, txt) => {
    notice.className = "notice " + (type || "");
    notice.textContent = txt;
  };

  // LOGIN normal (solo si ya existe cuenta)
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setN("", "Entrando...");
    try{
      await signInWithEmailAndPassword(auth, form.email.value.trim(), form.password.value);
      window.location.href = "dashboard.html";
    }catch(err){
      setN("err", "❌ " + (err?.message || "Error"));
    }
  });

  // REGISTER SOLO CON CÓDIGO
  btnRegister.addEventListener("click", async () => {
  setN("", "Creando cuenta...");

  const name = form.name.value.trim();
  const email = form.email.value.trim();
  const pass = form.password.value;
  const code = form.inviteCode.value.trim();

  if(!name){
    setN("err", "❌ Escribe tu nombre para crear la cuenta.");
    return;
  }
  if(!code){
    setN("err", "❌ Necesitas un código del coach para registrarte.");
    return;
  }

  // 1) Validar invitación ANTES de crear usuario
  const invRef = doc(db, "invites", code);
  const invSnap = await getDoc(invRef);

  if(!invSnap.exists()){
    setN("err", "❌ Código de invitación no existe.");
    return;
  }

  const inv = invSnap.data();

  if(inv.used === true){
    setN("err", "❌ Este código ya fue usado.");
    return;
  }

  if((inv.email || "").toLowerCase() !== email.toLowerCase()){
    setN("err", "❌ Este código no corresponde a este email.");
    return;
  }

  try{
    // 2) Crear Auth user
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    // 3) Crear perfil usuario en users/{uid} con lo del invite
    const userDoc = {
      role: "client",
      name,
      email,
      coachId: inv.coachId || null,
      premium: inv.premium === true,
      routineId: inv.routineId || null,
      trainingPlanId: inv.trainingPlanId || null,
      dietPlanId: inv.dietPlanId || null,
      createdAt: serverTimestamp()
    };

    await setDoc(doc(db, "users", cred.user.uid), userDoc);

    // 4) Marcar invite como usado
    await updateDoc(invRef, {
      used: true,
      usedAt: serverTimestamp(),
      usedBy: cred.user.uid
    });

    window.location.href = "dashboard.html";
  }catch(err){
    setN("err", "❌ " + (err?.message || "Error al registrar"));
  }
});
</script>
</body>
</html>
